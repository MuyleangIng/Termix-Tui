  <desc id="desc">A modern terminal dashboard preview with cyan borders, navigation, workspace panels, and an activity log.</desc>
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#00d9ff" flood-opacity="0.28"/>
    </filter>
    <linearGradient id="scan" x1="0" x2="1">
      <stop offset="0" stop-color="#00d9ff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0.10"/>
