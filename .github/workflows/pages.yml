name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "scripts/install.ps1"
      - "scripts/install.sh"
      - "scripts/uninstall.ps1"
      - "scripts/uninstall.sh"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p public
          cp -r site/* public/ || true
          mkdir -p public/docs
          cp docs/*.md public/docs/ || true
          cp scripts/install.ps1 public/install.ps1
          cp scripts/install.sh public/install.sh
          cp scripts/uninstall.ps1 public/uninstall.ps1
          cp scripts/uninstall.sh public/uninstall.sh

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
