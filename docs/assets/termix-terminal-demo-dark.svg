<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720" role="img" aria-labelledby="title desc">
  <title id="title">Termix TUI dashboard preview (Dark Mode)</title>
  <desc id="desc">A modern terminal dashboard preview with white borders on dark background.</desc>
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ffffff" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1120" height="720" fill="#0a0a0a"/>
  
  <!-- Main Frame -->
  <rect x="48" y="42" width="1024" height="636" rx="14" fill="#111111" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
  
  <!-- Title Bar -->
  <rect x="48" y="42" width="1024" height="46" rx="14" fill="#1a1a1a"/>
  <line x1="48" y1="88" x2="1072" y2="88" stroke="#333333"/>
  
  <!-- Window Controls -->
  <circle cx="78" cy="65" r="6" fill="#1a1a1a" stroke="#666666"/>
  <circle cx="100" cy="65" r="6" fill="#1a1a1a" stroke="#666666"/>
  <circle cx="122" cy="65" r="6" fill="#1a1a1a" stroke="#666666"/>
  
  <!-- Title Text -->
  <text x="154" y="70" fill="#ffffff" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="15" font-weight="700">TERMIX v0.1.11 | PowerShell 7 | atomic | Dark | ANSI ✓ | UTF8 ✓</text>

  <!-- Navigation Panel -->
  <rect x="70" y="112" width="214" height="392" rx="8" fill="#1a1a1a" stroke="#333333"/>
  <text x="92" y="144" fill="#ffffff" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="13" font-weight="700">[ NAVIGATION ]</text>
  <rect x="88" y="166" width="174" height="30" rx="5" fill="#ffffff"/>
  <text x="104" y="186" fill="#0a0a0a" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="14" font-weight="700">Dashboard</text>
  <text x="104" y="226" fill="#cccccc" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="14">Themes</text>
  <text x="104" y="264" fill="#cccccc" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="14">Fonts</text>
  <text x="104" y="302" fill="#cccccc" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="14">Profiles</text>
  <text x="104" y="340" fill="#cccccc" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="14">Settings</text>
  <rect x="88" y="420" width="174" height="58" rx="6" fill="#0a0a0a" stroke="#333333"/>
  <text x="104" y="445" fill="#888888" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="12">↑↓ Select</text>
  <text x="104" y="466" fill="#888888" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="12">Enter Open</text>

  <!-- Dashboard Panel -->
  <rect x="304" y="112" width="318" height="392" rx="8" fill="#1a1a1a" stroke="#ffffff" stroke-width="2"/>
  <text x="326" y="144" fill="#ffffff" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="14" font-weight="700">[ DASHBOARD ]</text>
  <rect x="326" y="166" width="252" height="30" rx="5" fill="#ffffff"/>
  <text x="342" y="186" fill="#0a0a0a" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="14" font-weight="700">&gt; Theme Manager</text>
  <text x="342" y="226" fill="#cccccc" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="14">Fonts</text>
  <text x="342" y="264" fill="#cccccc" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="14">Profile Manager</text>
  <text x="342" y="302" fill="#cccccc" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="14">Doctor</text>
  <text x="342" y="340" fill="#cccccc" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="14">Settings</text>
  <rect x="326" y="404" width="252" height="58" rx="6" fill="#111111" stroke="#333333"/>
  <text x="344" y="430" fill="#ffffff" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="12" font-weight="700">READY</text>
  <text x="344" y="452" fill="#888888" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="12">automatic setup complete</text>

  <!-- Workspace Panel -->
  <rect x="642" y="112" width="408" height="392" rx="8" fill="#1a1a1a" stroke="#333333"/>
  <text x="664" y="144" fill="#ffffff" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="14" font-weight="700">[ WORKSPACE ]</text>
  <text x="664" y="180" fill="#cccccc" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="14">Active profile: PowerShell 7</text>
  <text x="664" y="212" fill="#cccccc" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="14">Theme: atomic</text>
  <text x="664" y="244" fill="#cccccc" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="14">Mode: Dark</text>
  <rect x="664" y="284" width="346" height="86" rx="8" fill="#0a0a0a" stroke="#333333"/>
  <rect x="686" y="314" width="84" height="28" rx="5" fill="#ffffff"/>
  <text x="704" y="333" fill="#0a0a0a" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="13" font-weight="700">Admin</text>
  <polygon points="770,314 792,328 770,342" fill="#ffffff"/>
  <rect x="792" y="314" width="142" height="28" rx="5" fill="#888888"/>
  <text x="808" y="333" fill="#0a0a0a" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="13" font-weight="700">~/workspace</text>
  <polygon points="934,314 956,328 934,342" fill="#888888"/>
  <rect x="686" y="404" width="104" height="24" rx="4" fill="#1a1a1a" stroke="#ffffff"/>
  <text x="704" y="421" fill="#ffffff" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="12" font-weight="700">SUCCESS</text>
  <text x="806" y="421" fill="#cccccc" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="13">profile block verified</text>

  <!-- Activity Panel -->
  <rect x="70" y="532" width="980" height="92" rx="8" fill="#1a1a1a" stroke="#333333"/>
  <text x="92" y="564" fill="#ffffff" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="14" font-weight="700">[ ACTIVITY ]</text>
  <text x="92" y="592" fill="#ffffff" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="13">SUCCESS setup apply result: PowerShell 7 / atomic</text>
  <text x="92" y="616" fill="#888888" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="13">INFO setup layout ready</text>
  <text x="452" y="616" fill="#888888" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="13">INFO preview rendered</text>
  <text x="70" y="656" fill="#888888" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="13">Made by MuyleangIng | ↑↓ Select | Tab Focus | Enter Open | Q Quit</text>
</svg>
